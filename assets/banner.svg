<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c1222"/>
      <stop offset="100%" style="stop-color:#162032"/>
    </linearGradient>
  </defs>

  <rect width="800" height="200" rx="16" fill="url(#bg)"/>

  <!-- 7 level dots -->
  <circle cx="337" cy="62" r="6" fill="#4ADE80"/>
  <circle cx="358" cy="62" r="6" fill="#22C55E"/>
  <circle cx="379" cy="62" r="6" fill="#EAB308"/>
  <circle cx="400" cy="62" r="6" fill="#F97316"/>
  <circle cx="421" cy="62" r="6" fill="#EF4444"/>
  <circle cx="442" cy="62" r="6" fill="#DC2626"/>
  <circle cx="463" cy="62" r="6" fill="#991B1B"/>

  <!-- Title -->
  <text x="400" y="118" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-weight="800" font-size="48" letter-spacing="-1.5">
    <tspan fill="#ffffff">Open</tspan><tspan fill="#0D9488">Progression</tspan>
  </text>

  <!-- Tagline -->
  <text x="400" y="152" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-weight="400" font-size="16" fill="#94a3b8">
